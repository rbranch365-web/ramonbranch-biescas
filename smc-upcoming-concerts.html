<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Upcoming Concerts — St Mary Magdalene Concert Series, Brighton. Lunchtime concerts at St Mary Magdalene Church, curated by Ramon Branch Biescas." />
  <title>Upcoming Concerts — St Mary Magdalene Concert Series</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #f5f2ec;
      --ink: #1a1a18;
      --mid: #6b6560;
      --accent: #8b6f47;
      --rule: #d8d2c8;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'Raleway', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.7;
      min-height: 100vh;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 3rem;
      background: rgba(245,242,236,0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--rule);
    }

    .nav-logo {
      font-family: var(--font-display);
      font-size: 1.15rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: var(--ink);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      font-family: var(--font-body);
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--mid);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-links a:hover, .nav-links a.active { color: var(--ink); }

    /* PAGE HERO */
    .page-hero {
      position: relative;
      padding: 9rem 3rem 5rem;
      background: linear-gradient(135deg, #ede8df 0%, #f5f2ec 60%, #ede0cd 100%);
    }

    .page-hero-inner {
      max-width: 900px;
      margin: 0 auto;
    }

    .breadcrumb {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
    }

    .breadcrumb a, .breadcrumb span {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--mid);
      text-decoration: none;
    }

    .breadcrumb a:hover { color: var(--ink); }
    .breadcrumb .sep { color: var(--rule); }
    .breadcrumb .current { color: var(--accent); }

    .hero-label {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(2.8rem, 6vw, 4.5rem);
      font-weight: 300;
      line-height: 1.1;
      color: var(--ink);
      margin-bottom: 1.5rem;
    }

    .hero-title em { font-style: italic; color: var(--accent); }

    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--rule);
    }

    .hero-meta-item { display: flex; flex-direction: column; gap: 0.2rem; }

    .hero-meta-item .label {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--mid);
    }

    .hero-meta-item .value {
      font-family: var(--font-display);
      font-size: 1rem;
      color: var(--ink);
    }

    /* CONCERTS LIST */
    .concerts-section {
      max-width: 900px;
      margin: 0 auto;
      padding: 5rem 3rem 7rem;
    }

    .season-intro {
      text-align: center;
      font-family: var(--font-display);
      font-style: italic;
      font-size: 1.15rem;
      color: var(--mid);
      margin-bottom: 4rem;
    }

    .concert-list {
      display: flex;
      flex-direction: column;
    }

    /* Concert entry: date | photo | content */
    .concert-entry {
      display: grid;
      grid-template-columns: 90px 140px 1fr;
      gap: 2.5rem;
      padding: 3rem 0;
      border-bottom: 1px solid var(--rule);
      align-items: start;
    }

    .concert-entry:first-child { border-top: 1px solid var(--rule); }

    /* DATE COLUMN */
    .concert-date {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding-top: 0.2rem;
    }

    .concert-day, .concert-month {
      font-size: 0.66rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--mid);
    }

    .concert-daynum {
      font-family: var(--font-display);
      font-size: 2.6rem;
      font-weight: 300;
      line-height: 1;
      color: var(--ink);
      margin: 0.15rem 0;
    }

    /* PHOTO COLUMN */
    .concert-photo {
      width: 140px;
      flex-shrink: 0;
    }

    .concert-photo img {
      width: 100%;
      aspect-ratio: 3 / 4;
      object-fit: cover;
      object-position: center top;
      display: block;
      border-radius: 2px;
      filter: sepia(8%) contrast(1.02);
    }

    /* landscape group shots */
    .concert-photo.landscape img {
      aspect-ratio: 4 / 3;
      object-position: center center;
    }

    /* Kairos Winds: shift crop downward so heads are not cut off */
    .concert-photo.kairos-photo img {
      object-position: center 28%;
    }

    /* CONTENT COLUMN */
    .concert-title {
      font-family: var(--font-display);
      font-size: 1.75rem;
      font-weight: 400;
      font-style: italic;
      color: var(--ink);
      margin-bottom: 0.3rem;
    }

    .concert-players {
      font-size: 0.82rem;
      color: var(--accent);
      letter-spacing: 0.02em;
      margin-bottom: 1.4rem;
    }

    .programme {
      list-style: none;
      display: flex;
      flex-direction: column;
    }

    .programme li {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 1.5rem;
      font-size: 0.86rem;
      padding: 0.55rem 0;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }

    .programme li:last-child { border-bottom: none; }

    .programme .piece { color: var(--ink); }
    .programme .piece .arr {
      display: block;
      font-size: 0.76rem;
      color: var(--mid);
      font-style: italic;
      margin-top: 0.1rem;
    }

    .programme .meta {
      color: var(--mid);
      font-style: italic;
      white-space: nowrap;
      text-align: right;
    }

    .concert-note {
      margin-top: 1.1rem;
      font-size: 0.8rem;
      color: var(--mid);
      font-style: italic;
    }

    .concert-note strong {
      color: var(--ink);
      font-style: normal;
      font-weight: 500;
    }

    /* PERFORM STRIP */
    .perform-strip {
      background: var(--ink);
      color: var(--cream);
      padding: 4rem 3rem;
    }

    .perform-strip-inner {
      max-width: 900px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 3rem;
      align-items: center;
    }

      font-family: var(--font-display);
      font-
