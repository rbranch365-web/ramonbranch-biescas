<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ramon Branch Biescas</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@300;400;500&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">

<style>

/* ===== ROOT ===== */
:root{
--w:#f9f8f5;
--w2:#f2f0ec;
--ink:#1a1714;
--mid:#6f6a63;
--gold:#8b5e2a;
}

/* ===== LOADER ===== */
#loader{
position:fixed;
inset:0;
background:#111;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
color:#fff;
font-family:'Cormorant',serif;
font-size:1.5rem;
letter-spacing:.2em;
transition:opacity 1s ease;
}

#loader.hide{
opacity:0;
pointer-events:none;
}

/* ===== BASE ===== */
body{
margin:0;
font-family:'Jost',sans-serif;
background:var(--w);
color:var(--ink);
overflow-x:hidden;
transition:opacity .6s ease, filter .6s ease;
}

/* PAGE TRANSITION */
body.fade-out{
opacity:0;
filter:blur(6px);
}

/* ===== NAV ===== */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:1.2rem 3rem;
z-index:1000;
background:rgba(249,248,245,.9);
backdrop-filter:blur(20px);
transition:.4s;
}

nav.scrolled{
background:rgba(249,248,245,.7);
backdrop-filter:blur(28px);
}

/* ===== HERO ===== */
#hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
color:#fff;
background:url('images/concert1.jpg') center/cover no-repeat;
position:relative;
overflow:hidden;
}

#hero::before{
content:'';
position:absolute;
inset:0;
background:rgba(0,0,0,.55);
}

#hero h1{
font-family:'Cormorant',serif;
font-size:clamp(3rem,8vw,7rem);
letter-spacing:-.02em;
animation:fadeUp 1s ease forwards;
}

#hero p{
letter-spacing:.3em;
text-transform:uppercase;
font-size:.7rem;
opacity:.7;
animation:fadeUp 1s .3s ease forwards;
}

@keyframes fadeUp{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

/* ===== PARALLAX ===== */
#hero{
background-attachment:fixed;
}

/* ===== SECTIONS ===== */
section{
padding:7rem 3rem;
max-width:1100px;
margin:auto;
}

/* ===== CONCERTS ===== */
.ctable{
width:100%;
border-collapse:collapse;
}

.ctable tr{
border-bottom:1px solid rgba(0,0,0,.08);
transition:.4s;
}

.ctable tr:hover{
background:var(--w2);
transform:translateX(8px);
}

/* ===== GALLERY ===== */
.pgrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
}

.pgi{
overflow:hidden;
}

.pgi img{
width:100%;
opacity:0;
transform:scale(1.1);
transition:1.2s ease;
}

.pgi.in img{
opacity:1;
transform:scale(1);
}

/* ===== REELS ===== */
.rgrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:1rem;
}

.ritem{
background:#fff;
transition:.4s;
}

.ritem:hover{
transform:translateY(-5px);
box-shadow:0 10px 40px rgba(0,0,0,.1);
}

/* ===== FOOTER ===== */
footer{
background:#111;
color:#fff;
padding:2rem;
text-align:center;
letter-spacing:.2em;
font-size:.7rem;
}

/* ===== SCROLL REVEAL ===== */
.rv{
opacity:0;
transform:translateY(25px);
transition:.9s;
}

.rv.in{
opacity:1;
transform:translateY(0);
}

</style>
</head>

<body>

<div id="loader">RB</div>

<nav id="nav">
<div>Ramon Branch Biescas</div>
<div>
<a href="#concerts">Concerts</a>
<a href="#media">Media</a>
<a href="#reels">Reels</a>
</div>
</nav>

<section id="hero">
<h1>Ramon Branch Biescas</h1>
<p>Tuba · Organ · Teacher</p>
</section>

<section id="concerts" class="rv">
<h2>Concerts</h2>
<table class="ctable">
<tr><td>19 Sep 2025</td><td>Heron Brass Performance</td></tr>
<tr><td>20 Sep 2025</td><td>Dido and Aeneas</td></tr>
</table>
<a href="future-concerts.html">View all concerts</a>
</section>

<section id="media">
<h2>Gallery</h2>
<div class="pgrid">
<div class="pgi"><img src="images/concert1.jpg" onerror="this.style.display='none'"></div>
<div class="pgi"><img src="images/concert2.jpg" onerror="this.style.display='none'"></div>
<div class="pgi"><img src="images/concert3.jpg" onerror="this.style.display='none'"></div>
</div>
</section>

<section id="reels">
<h2>Reels</h2>
<div class="rgrid">

<div class="ritem">
<blockquote class="instagram-media"
data-instgrm-permalink="https://www.instagram.com/reel/DV1ICIajOvK/"
data-instgrm-version="14"></blockquote>
</div>

<div class="ritem">
<blockquote class="instagram-media"
data-instgrm-permalink="https://www.instagram.com/reel/DUdCr7QDfrz/"
data-instgrm-version="14"></blockquote>
</div>

<div class="ritem">
<blockquote class="instagram-media"
data-instgrm-permalink="https://www.instagram.com/reel/DTOAFJYDWqU/"
data-instgrm-version="14"></blockquote>
</div>

</div>
</section>

<footer>
© Ramon Branch Biescas
</footer>

<!-- LOADER -->
<script>
window.addEventListener("load",()=>{
setTimeout(()=>document.getElementById("loader").classList.add("hide"),700);
});
</script>

<!-- INSTAGRAM FIX -->
<script async src="https://www.instagram.com/embed.js"></script>
<script>
function loadInstagramEmbeds(){
if(window.instgrm){window.instgrm.Embeds.process();}
}
window.addEventListener("load",loadInstagramEmbeds);
setTimeout(loadInstagramEmbeds,1500);
</script>

<!-- SCROLL REVEAL -->
<script>
const ro=new IntersectionObserver(entries=>{
entries.forEach(e=>{
if(e.isIntersecting){
e.target.classList.add('in');
}
});
},{threshold:.1});

document.querySelectorAll('.rv, .pgi').forEach(el=>ro.observe(el));
</script>

<!-- NAV SCROLL -->
<script>
window.addEventListener('scroll',()=>{
document.getElementById('nav').classList.toggle('scrolled',window.scrollY>10);
});
</script>

<!-- PAGE TRANSITION -->
<script>
document.querySelectorAll("a").forEach(link=>{
link.addEventListener("click",function(e){
const href=this.getAttribute("href");

if(href && !href.startsWith("#") && !href.startsWith("http")){
e.preventDefault();
document.body.classList.add("fade-out");

setTimeout(()=>{
window.location=href;
},500);
}
});
});
</script>

</body>
</html>
