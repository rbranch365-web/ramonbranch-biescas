<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>All Concerts — Ramon Branch Biescas</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@300;400;500&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">

<style>
:root {
  --w:#f9f8f5;
  --w2:#f2f0ec;
  --ink:#1a1714;
  --mid:#6f6a63;
  --gold:#8b5e2a;
}

body {
  font-family:'Jost',sans-serif;
  background:var(--w);
  color:var(--ink);
  margin:0;
}

.wrap {
  max-width:1000px;
  margin:0 auto;
  padding:6rem 2rem;
}

h1 {
  font-family:'Cormorant',serif;
  font-size:3rem;
  margin-bottom:3rem;
}

table {
  width:100%;
  border-collapse:collapse;
}

tr {
  border-bottom:1px solid rgba(0,0,0,0.1);
  transition:all .3s;
}

tr:hover {
  background:var(--w2);
  transform:translateX(6px);
}

td {
  padding:1.2rem 0;
}

.back {
  margin-top:3rem;
  display:inline-block;
  font-size:.7rem;
  letter-spacing:.2em;
  text-transform:uppercase;
  text-decoration:none;
  border-bottom:1px solid rgba(0,0,0,0.2);
}

.back:hover {
  color:var(--gold);
}
</style>
</head>

<body>

<div class="wrap">
  <h1>All Upcoming Concerts</h1>

  <table>
    <tr>
      <td>19 Sep 2025</td>
      <td>Heron Brass Performance</td>

    </tr>
    <tr>
      <td>20 Sep 2025</td>

    </tr>

    </tr>
  </table>

  <a href="index.html" class="back">← Back to Home</a>
</div>

</body>
</html>
